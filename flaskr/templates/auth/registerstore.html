{% extends 'base.html' %}
{% block header %}
    <h1>
        <!-- {% block title %}Register Store{% endblock %} -->
    </h1>
{% endblock %}
{% block content %}
    <main class="form-signin w-100 m-auto">
        <h1 class="h3 mb-3 fw-normal">Register Store</h1>
        <form method="post">
            <div class="form-floating">
                <input type="text"
                       name="username"
                       class="form-control"
                       id="floatingUsername"
                       required>
                <label for="floatingUsername">Store Username</label>
            </div>
            <div class="form-floating">
                <input type="text"
                       name="store_name"
                       class="form-control"
                       id="floatingStoreName"
                       required>
                <label for="floatingStoreName">Store Name</label>
            </div>
            <div class="form-floating">
                <input type="password"
                       name="password"
                       class="form-control"
                       id="floatingPassword"
                       required>
                <label for="floatingPassword">Password</label>
            </div>
            <button class="btn btn-primary w-100 py-2 my-2" type="submit">Register Store</button>
        </form>
        <div class="mt-3 text-center">
            <p>
                Are you a customer?
                <br>
                <a href="{{ url_for("auth.register") }}">Register as a user here</a>
            </p>
        </div>
    </main>
{% endblock %}
