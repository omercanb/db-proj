{% extends 'base.html' %}
{% block header %}
    <h1>
        {% block title %}Stores{% endblock %}
    </h1>
{% endblock %}
{% block content %}
    <form method="get" class="mb-4">
        <input type="text"
               name="search"
               value="{{ search }}"
               placeholder="Search stores..."
               class="form-control" />
    </form>
    <div class="card-grid card-grid-3col">
        {% for store in stores %}
            <a href="{{ url_for('stores.store', store_id=store['id']) }}"
               class="text-decoration-none">
                <div class="card h-100 store-card">
                    <div class="card-body">
                        <h5 class="card-title">{{ store['name'] }}</h5>
                        <p class="card-text text-muted">Placeholder Address</p>
                    </div>
                </div>
            </a>
        {% endfor %}
    </div>
{% endblock %}
