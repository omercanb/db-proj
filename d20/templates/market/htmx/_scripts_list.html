{% if scripts %}
    {% for script in scripts %}
        <button type="button"
                class="list-group-item list-group-item-action script-item"
                hx-get="/market/algorithmic/load/script/{{ script['id'] }}"
                hx-target="#script-editor"
                hx-swap="innerHTML"
                hx-on::afterSettle="loadScriptOrders({{ script['id'] }})">{{ script['name'] }}</button>
    {% endfor %}
{% else %}
    <p class="text-muted p-2">No scripts yet</p>
{% endif %}
